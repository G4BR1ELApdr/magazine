    <section class="news-hero">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-8 text-center">
            <span class="news-tag" id="news-tag"></span>
            <h1 class="news-title" id="news-title"></h1>
            <p class="news-text" id="news-text"></p>
          </div>
        </div>
      </div>
    </section>

      <div class="container">
        <div class="row g-4">
          <div class="col-12 col-md-6 col-lg-4">
            <article class="story-card">
              <a href="single-post.html?id=featured-0">

              </a>
              <div class="story-card-body">
                <span class="story-tag" id="news-featured-tag"></span>
                <h3 class="story-card-title">
                  <a href="single-post.html?id=featured-0" class="story-link" id="news-featured-title"></a>

          <div class="col-12 col-md-6 col-lg-4">

              <div class="story-card-body">
                <span class="story-tag" id="news-story-0-tag"></span>

                  <a href="single-post.html?id=story-0" class="story-link" id="news-story-0-title"></a>

                <p class="story-date" id="news-story-0-date"></p>

          </div>

          <div class="col-12 col-md-6 col-lg-4">
            <article class="story-card">
              <a href="single-post.html?id=story-1">
                <img src="./img/trend-2.png" alt="Story 1" class="story-card-img">

              <div class="story-card-body">
                <span class="story-tag story-tag-brown" id="news-story-1-tag"></span>

              </div>
