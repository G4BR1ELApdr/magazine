<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosotros | Magazine Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg custom-navbar custom-navbar-solid">
    <div class="container">
      <a class="navbar-brand custom-brand" href="index.html" id="brand"></a>

      <button
        class="navbar-toggler custom-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#aboutNavbar"
        aria-controls="aboutNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="aboutNavbar">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link custom-nav-link" href="index.html" id="nav-home"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="aboutUs.html" id="nav-about"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="news.html" id="nav-news"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="contact.html" id="nav-contact"></a></li>
        </ul>

        <div class="nav-actions">
          <button type="button" class="language-switcher" id="language-switcher">EN</button>
          <a href="index.html#suscribete" class="navbar-cta" id="nav-cta"></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="about-page">
    <section class="about-hero">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-8 text-center">
            <span class="about-tag" id="about-tag"></span>
            <h1 class="about-title" id="about-title"></h1>
            <p class="about-text" id="about-text"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="about-grid-section">
      <div class="container">
        <div class="row g-4">
          <div class="col-12 col-lg-4">
            <article class="about-card">
              <span class="about-card-number" id="about-card-0-number"></span>
              <h2 class="about-card-title" id="about-card-0-title"></h2>
              <p class="about-card-text" id="about-card-0-text"></p>
            </article>
          </div>

          <div class="col-12 col-lg-4">
            <article class="about-card">
              <span class="about-card-number" id="about-card-1-number"></span>
              <h2 class="about-card-title" id="about-card-1-title"></h2>
              <p class="about-card-text" id="about-card-1-text"></p>
            </article>
          </div>

          <div class="col-12 col-lg-4">
            <article class="about-card">
              <span class="about-card-number" id="about-card-2-number"></span>
              <h2 class="about-card-title" id="about-card-2-title"></h2>
              <p class="about-card-text" id="about-card-2-text"></p>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="about-highlight-section">
      <div class="container">
        <div class="about-highlight-box">
          <div class="row align-items-center g-4">
            <div class="col-12 col-lg-6">
              <img src="./img/featured-section.png" alt="About highlight" class="about-highlight-image">
            </div>

            <div class="col-12 col-lg-6">
              <span class="about-highlight-tag" id="about-highlight-tag"></span>
              <h2 class="about-highlight-title" id="about-highlight-title"></h2>
              <p class="about-highlight-text" id="about-highlight-text-1"></p>
              <p class="about-highlight-text" id="about-highlight-text-2"></p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-6">
          <p class="footer-copy mb-0" id="footer-copy"></p>
        </div>
        <div class="col-12 col-md-6">
          <div class="footer-links">
            <a href="https://www.instagram.com/gabip2.0/" id="footer-instagram" target="_blank"
              rel="noopener noreferrer"></a>
            <a href="https://www.behance.net/gabiperezderosa" id="footer-behance" target="_blank"
              rel="noopener noreferrer"></a>
            <a href="https://www.linkedin.com/in/gabriela-p%C3%A9rez-de-rosa-817428216/" id="footer-linkedin"
              target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="./js/aboutUs-script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
