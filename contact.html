<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Magazine Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg custom-navbar custom-navbar-solid">
    <div class="container">
      <a class="navbar-brand custom-brand" href="index.html" id="brand"></a>

      <button
        class="navbar-toggler custom-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#contactNavbar"
        aria-controls="contactNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="contactNavbar">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link custom-nav-link" href="index.html" id="nav-home"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="aboutUs.html" id="nav-about"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="news.html" id="nav-news"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="contact.html" id="nav-contact"></a></li>
        </ul>

        <div class="nav-actions">
          <button type="button" class="language-switcher" id="language-switcher">EN</button>
          <a href="index.html#suscribete" class="navbar-cta" id="nav-cta"></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="contact-page">
    <section class="contact-hero">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-8 text-center">
            <span class="contact-tag" id="contact-tag"></span>
            <h1 class="contact-title" id="contact-title"></h1>
            <p class="contact-text" id="contact-text"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="contact-section-main">
      <div class="container">
        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <div class="contact-info-box">
              <h2 class="contact-box-title" id="contact-info-title"></h2>

              <div class="contact-info-item">
                <span class="contact-label" id="contact-label-email"></span>
                <p class="contact-value" id="contact-value-email"></p>
              </div>

              <div class="contact-info-item">
                <span class="contact-label" id="contact-label-instagram"></span>
                <p class="contact-value" id="contact-value-instagram"></p>
              </div>

              <div class="contact-info-item">
                <span class="contact-label" id="contact-label-linkedin"></span>
                <p class="contact-value" id="contact-value-linkedin"></p>
              </div>

              <div class="contact-info-item">
                <span class="contact-label" id="contact-label-schedule"></span>
                <p class="contact-value" id="contact-value-schedule"></p>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-7">
            <div class="contact-form-box">
              <h2 class="contact-box-title" id="contact-form-title"></h2>

              <form class="contact-form">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <input type="text" class="contact-input" id="contact-name">
                  </div>

                  <div class="col-12 col-md-6">
                    <input type="email" class="contact-input" id="contact-email">
                  </div>

                  <div class="col-12">
                    <input type="text" class="contact-input" id="contact-subject">
                  </div>

                  <div class="col-12">
                    <textarea class="contact-textarea" rows="6" id="contact-message"></textarea>
                  </div>

                  <div class="col-12">
                    <button type="submit" class="contact-button" id="contact-button"></button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-6">
          <p class="footer-copy mb-0" id="footer-copy"></p>
        </div>
        <div class="col-12 col-md-6">
          <div class="footer-links">
            <a href="https://www.instagram.com/gabip2.0/" id="footer-instagram" target="_blank"
              rel="noopener noreferrer"></a>
            <a href="https://www.behance.net/gabiperezderosa" id="footer-behance" target="_blank"
              rel="noopener noreferrer"></a>
            <a href="https://www.linkedin.com/in/gabriela-p%C3%A9rez-de-rosa-817428216/" id="footer-linkedin"
              target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="./js/contact-script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
