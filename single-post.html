<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | Magazine Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg custom-navbar custom-navbar-solid">
    <div class="container">
      <a class="navbar-brand custom-brand" href="index.html" id="brand"></a>

      <button
        class="navbar-toggler custom-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#postNavbar"
        aria-controls="postNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="postNavbar">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link custom-nav-link" href="index.html" id="nav-home"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="aboutUs.html" id="nav-about"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="news.html" id="nav-news"></a></li>
          <li class="nav-item"><a class="nav-link custom-nav-link" href="contact.html" id="nav-contact"></a></li>
        </ul>

        <div class="nav-actions">
          <button type="button" class="language-switcher" id="language-switcher">EN</button>
          <a href="index.html#suscribete" class="navbar-cta" id="nav-cta"></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="article-page">
    <section class="article-hero">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-8">
            <span class="article-tag" id="post-category"></span>
            <h1 class="article-title" id="post-title"></h1>

            <div class="article-meta">
              <span id="post-date"></span>
              <span id="post-read-time"></span>
              <span id="post-author"></span>
            </div>

            <p class="article-excerpt" id="post-excerpt"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="article-cover-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-10">
            <img src="" alt="" class="article-cover" id="post-image">
          </div>
        </div>
      </div>
    </section>

    <section class="article-content-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-8">
            <div class="article-content" id="post-content"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-md-6">
          <p class="footer-copy mb-0" id="footer-copy"></p>
        </div>
        <div class="col-12 col-md-6">
          <div class="footer-links">
            <a href="https://www.instagram.com/gabip2.0/" id="footer-instagram" target="_blank"
              rel="noopener noreferrer"></a>
            <a href="https://www.behance.net/gabiperezderosa" id="footer-behance" target="_blank"
              rel="noopener noreferrer"></a>
            <a href="https://www.linkedin.com/in/gabriela-p%C3%A9rez-de-rosa-817428216/" id="footer-linkedin"
              target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="./js/script-post.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
